{{/* Deployment verification */}}
{{ if eq hugo.Environment "production" }}{{ with getenv "GITHUB_SHA" }}<meta name="build-id" content="{{ . }}">{{ end }}{{ end }}

{{/* Icons and browser chrome */}}
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png">
<meta name="theme-color" content="#f7f6f1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111713" media="(prefers-color-scheme: dark)">

{{/* Analytics */}}
<script data-goatcounter="https://sjcaldwell.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>
