{{/* Keep the visible control, explicit override, and live OS preference in sync. */}}
<script>
(function () {
  const root = document.documentElement;
  const toggle = document.getElementById('theme-toggle');
  const systemTheme = window.matchMedia('(prefers-color-scheme: dark)');

  if (!toggle) return;

  const savedTheme = function () {
    try {
      const theme = localStorage.getItem('pref-theme');
      return theme === 'light' || theme === 'dark' ? theme : null;
    } catch (_) {
      return null;
    }
  };

  const updateControl = function (theme) {
    const isDark = theme === 'dark';
    const label = 'Switch to ' + (isDark ? 'light' : 'dark') + ' color scheme';
    toggle.setAttribute('aria-label', label);
    toggle.setAttribute('aria-pressed', String(isDark));
    toggle.title = label + ' (Alt + T)';
  };

  updateControl(document.body.classList.contains('dark') ? 'dark' : 'light');

  toggle.addEventListener('click', function () {
    const nextTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
    root.dataset.theme = nextTheme;
    updateControl(nextTheme);
  });

  const followSystemTheme = function (event) {
    if (savedTheme()) return;
    const theme = event.matches ? 'dark' : 'light';
    root.removeAttribute('data-theme');
    document.body.classList.toggle('dark', event.matches);
    updateControl(theme);
  };

  if (systemTheme.addEventListener) {
    systemTheme.addEventListener('change', followSystemTheme);
  } else if (systemTheme.addListener) {
    systemTheme.addListener(followSystemTheme);
  }
})();
</script>

{{/* MathJax: preserve TeX support without changing article typography. */}}
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true,
    processEnvironments: true
  },
  options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
};
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const article = document.querySelector('.post-single');
  if (!article) return;

  // A minimal reading-progress rule rewards long articles without adding chrome.
  const progress = document.createElement('div');
  progress.id = 'reading-progress';
  progress.setAttribute('aria-hidden', 'true');
  document.body.appendChild(progress);

  const updateProgress = function () {
    const content = article.querySelector('.post-content');
    if (!content) return;
    const start = content.offsetTop;
    const distance = Math.max(1, content.offsetHeight - window.innerHeight);
    const value = Math.min(1, Math.max(0, (window.scrollY - start) / distance));
    progress.style.width = (value * 100) + '%';
  };
  updateProgress();
  window.addEventListener('scroll', updateProgress, { passive: true });
  window.addEventListener('resize', updateProgress);

  // Desktop: a persistent TOC rail. Mobile: a compact, user-controlled disclosure.
  const tocDetails = article.querySelector('.toc details');
  const syncToc = function () {
    if (!tocDetails) return;
    tocDetails.open = window.matchMedia('(min-width: 1050px)').matches;
  };
  syncToc();
  window.addEventListener('resize', syncToc);

  const tocLinks = Array.from(article.querySelectorAll('.toc a[href^="#"]'));
  if ('IntersectionObserver' in window && tocLinks.length) {
    const linksById = new Map(tocLinks.map(function (link) {
      return [decodeURIComponent(link.hash.slice(1)), link];
    }));
    const headings = Array.from(article.querySelectorAll('.post-content h2[id], .post-content h3[id]'));
    const observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        tocLinks.forEach(function (link) { link.classList.remove('is-active'); });
        const active = linksById.get(entry.target.id);
        if (active) active.classList.add('is-active');
      });
    }, { rootMargin: '-18% 0px -70% 0px' });
    headings.forEach(function (heading) { observer.observe(heading); });
  }

  // Copy buttons stay terse and work for both highlighted and plain code blocks.
  article.querySelectorAll('pre > code').forEach(function (code) {
    const pre = code.parentElement;
    if (pre.querySelector('.copy-code')) return;
    const button = document.createElement('button');
    button.className = 'copy-code';
    button.type = 'button';
    button.textContent = 'Copy';
    button.setAttribute('aria-label', 'Copy code to clipboard');
    button.addEventListener('click', async function () {
      try {
        await navigator.clipboard.writeText(code.textContent || '');
        button.textContent = 'Copied';
        window.setTimeout(function () { button.textContent = 'Copy'; }, 1600);
      } catch (_) {
        button.textContent = 'Select + copy';
      }
    });
    pre.appendChild(button);
  });

  // Footnotes remain in the document, with an additional contextual reading layer.
  let popover = null;
  let hideTimer = null;

  const closePopover = function () {
    if (hideTimer) window.clearTimeout(hideTimer);
    if (popover) popover.remove();
    popover = null;
    article.querySelectorAll('.footnote-ref[aria-expanded="true"]').forEach(function (ref) {
      ref.setAttribute('aria-expanded', 'false');
    });
  };

  const openPopover = function (ref) {
    closePopover();
    const targetId = decodeURIComponent(ref.hash.slice(1));
    const note = document.getElementById(targetId);
    if (!note) return;

    popover = document.createElement('aside');
    popover.className = 'footnote-popover';
    popover.setAttribute('role', 'note');
    popover.innerHTML = '<span class="footnote-popover__label">Note ' + ref.textContent.trim() + '</span>' + note.innerHTML + '<button class="footnote-popover__close" type="button" aria-label="Close footnote">×</button>';
    document.body.appendChild(popover);
    ref.setAttribute('aria-expanded', 'true');

    const close = popover.querySelector('.footnote-popover__close');
    close.addEventListener('click', closePopover);
    popover.addEventListener('mouseenter', function () {
      if (hideTimer) window.clearTimeout(hideTimer);
    });
    popover.addEventListener('mouseleave', function () {
      if (!window.matchMedia('(max-width: 640px)').matches) hideTimer = window.setTimeout(closePopover, 120);
    });

    if (!window.matchMedia('(max-width: 640px)').matches) {
      const rect = ref.getBoundingClientRect();
      const width = popover.offsetWidth;
      let left = rect.left + window.scrollX - (width / 2) + (rect.width / 2);
      left = Math.max(16, Math.min(left, window.scrollX + window.innerWidth - width - 16));
      let top = rect.top + window.scrollY - popover.offsetHeight - 12;
      if (top < window.scrollY + 12) top = rect.bottom + window.scrollY + 12;
      popover.style.left = left + 'px';
      popover.style.top = top + 'px';
    }
  };

  article.querySelectorAll('a.footnote-ref').forEach(function (ref) {
    ref.setAttribute('aria-expanded', 'false');
    ref.addEventListener('mouseenter', function () {
      if (!window.matchMedia('(max-width: 640px)').matches) openPopover(ref);
    });
    ref.addEventListener('mouseleave', function () {
      if (!window.matchMedia('(max-width: 640px)').matches) hideTimer = window.setTimeout(closePopover, 120);
    });
    ref.addEventListener('focus', function () {
      if (!window.matchMedia('(max-width: 640px)').matches) openPopover(ref);
    });
    ref.addEventListener('click', function (event) {
      if (!window.matchMedia('(max-width: 640px)').matches) return;
      event.preventDefault();
      if (ref.getAttribute('aria-expanded') === 'true') closePopover();
      else openPopover(ref);
    });
  });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') closePopover();
  });
});
</script>
